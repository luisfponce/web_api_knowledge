services:
  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-replace_with_local_root_password}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-crud_data}
      MARIADB_USER: ${MARIADB_USER:-webapi_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-replace_with_local_database_password}
    ports:
      - "${MARIADB_HOST_PORT:-3306}:3306"
    volumes:
      - webapi-mariadb-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "MYSQL_PWD=\"$${MARIADB_PASSWORD}\" mariadb-admin ping -h 127.0.0.1 -u \"$${MARIADB_USER}\" >/dev/null" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: .
    environment:
      DB_URL: ${DB_URL:-mariadb+mariadbconnector://webapi_user:replace_with_local_database_password@mariadb:3306/crud_data}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PSW: ${REDIS_PSW:-}
      ENV_MAIL_USERNAME: ${ENV_MAIL_USERNAME:-test@example.com}
      ENV_MAIL_PASSWORD: ${ENV_MAIL_PASSWORD:-replace_with_local_mail_app_password}
      ENV_MAIL_FROM: ${ENV_MAIL_FROM:-test@example.com}
      ENV_SECRET_KEY: ${ENV_SECRET_KEY:-replace_with_local_jwt_secret}
    ports:
      - "8000:8000"
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:8000/" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  webapi-mariadb-data:
